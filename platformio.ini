[platformio]
default_envs = steami
test_dir = tests

[env:steami]
platform = ststm32@^19
board = steami
framework = arduino
monitor_speed = 115200
test_framework = unity
test_filter = hardware/test_*

[env:native]
platform = native
test_framework = unity
test_filter = native/test_*
build_flags =
  -D UNIT_TEST
  -I tests/native/helpers
